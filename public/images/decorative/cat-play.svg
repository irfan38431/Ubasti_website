  <!-- Whiskers -->
  <line x1="257" y1="158" x2="285" y2="150" stroke-width="1.5" />
  <line x1="258" y1="162" x2="288" y2="160" stroke-width="1.5" />
  <line x1="257" y1="166" x2="285" y2="172" stroke-width="1.5" />
  <!-- Raised paw (left, reaching up) -->
  <path d="M 205 155 Q 185 140 170 120 Q 160 105 155 90 Q 152 80 148 75" stroke-width="2.5" />
