  <path d="M 242 212 Q 248 240 252 270 Q 254 290 255 305 Q 255 320 258 332 Q 260 340 265 342" />
  <path d="M 265 342 L 272 342" stroke-width="2" />
  <!-- Hind legs tucked -->
  <path d="M 148 300 Q 135 310 125 325 Q 118 335 120 340 Q 125 345 135 342" />
  <path d="M 135 342 L 145 340" stroke-width="2" />
  <path d="M 250 295 Q 265 310 275 325 Q 280 335 278 340 Q 273 345 265 342" />
