<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none" stroke="#2C2E1F" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Walking cat — in motion, tail raised high -->
  <!-- Body (horizontal, elongated) -->
  <ellipse cx="200" cy="220" rx="110" ry="50" />
  <!-- Head -->
  <circle cx="310" cy="185" r="48" />
  <!-- Ears -->
  <polygon points="282,152 272,108 302,145" />
  <polygon points="335,148 348,106 320,142" />
  <!-- Inner ears -->
  <polygon points="285,150 278,118 298,145" stroke-width="1.5" />
  <polygon points="332,148 342,118 324,142" stroke-width="1.5" />
  <!-- Eyes (forward-looking, focused) -->
  <circle cx="298" cy="180" r="10" />
  <circle cx="326" cy="178" r="10" />
  <circle cx="300" cy="180" r="4" fill="#2C2E1F" stroke="none" />
  <circle cx="328" cy="178" r="4" fill="#2C2E1F" stroke="none" />
  <!-- Nose -->
  <circle cx="340" cy="192" r="3" fill="#2C2E1F" stroke="none" />
  <path d="M337 194 Q340 198 343 194" />
  <!-- Mouth -->
  <path d="M332 200 Q340 206 348 200" />
  <!-- Whiskers -->
  <line x1="350" y1="188" x2="388" y2="182" />
  <line x1="352" y1="194" x2="392" y2="192" />
  <line x1="350" y1="200" x2="388" y2="204" />
  <line x1="282" y1="190" x2="260" y2="186" />
  <line x1="280" y1="196" x2="256" y2="196" />
  <!-- Front legs (walking stride) -->
  <!-- Front left (forward) -->
  <path d="M270 260 Q278 300 285 330 Q288 342 275 342" />
  <ellipse cx="278" cy="345" rx="14" ry="6" />
  <!-- Front right (back) -->
  <path d="M240 262 Q235 295 230 325 Q228 336 242 336" />
  <ellipse cx="238" cy="339" rx="14" ry="6" />
  <!-- Hind legs (walking stride) -->
  <!-- Hind left (back, extended) -->
  <path d="M130 258 Q110 300 100 330 Q96 342 112 342" />
  <ellipse cx="108" cy="345" rx="14" ry="6" />
  <!-- Hind right (forward) -->
  <path d="M155 260 Q165 298 170 328 Q172 340 158 340" />
  <ellipse cx="162" cy="343" rx="14" ry="6" />
  <!-- Tail (raised high, graceful curve) -->
  <path d="M90 210 Q55 170 50 130 Q48 100 65 85 Q80 75 88 90" />
</svg>
