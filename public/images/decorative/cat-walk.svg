<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none" stroke="#2C2E1F" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Realistic cat walking — mid-stride, tail up, looking forward -->
  <!-- Top body contour (back) -->
  <path d="
    M 60 200
    Q 80 185 110 178
    Q 140 172 170 170
    Q 200 168 230 168
    Q 260 170 280 175
    Q 295 180 305 190
  " />
  <!-- Bottom body contour (belly) -->
  <path d="
    M 95 235
    Q 120 242 150 244
    Q 180 245 210 244
    Q 240 242 265 238
    Q 280 234 290 225
  " />
  <!-- Head -->
  <path d="
    M 305 190
    Q 315 185 325 183
    Q 338 182 345 188
    Q 350 195 348 205
    Q 344 215 335 220
    Q 325 224 315 222
    Q 308 218 305 212
    Q 302 205 305 198
  " />
  <!-- Ear left -->
  <path d="M 315 185 Q 308 168 312 155 Q 320 165 325 183" />
  <!-- Ear right -->
  <path d="M 338 182 Q 340 164 352 155 Q 350 168 348 185" />
  <!-- Eye -->
  <circle cx="332" cy="198" r="3" fill="#2C2E1F" stroke="none" />
  <!-- Nose -->
  <circle cx="347" cy="207" r="2" fill="#2C2E1F" stroke="none" />
  <!-- Whiskers -->
  <line x1="349" y1="204" x2="375" y2="196" stroke-width="1.5" />
  <line x1="350" y1="208" x2="378" y2="206" stroke-width="1.5" />
  <line x1="349" y1="212" x2="375" y2="218" stroke-width="1.5" />
  <!-- Front left leg (forward stride) -->
  <path d="M 280 175 Q 290 200 298 230 Q 302 250 308 270 Q 310 285 312 295 Q 312 305 305 308" />
  <path d="M 305 308 L 295 310" stroke-width="2" />
  <!-- Front right leg (back stride) -->
  <path d="M 265 238 Q 270 255 272 275 Q 274 290 270 302 Q 268 310 260 312" />
  <path d="M 260 312 L 250 312" stroke-width="2" />
  <!-- Hind left leg (back, extended) -->
  <path d="M 110 178 Q 100 195 92 218 Q 86 238 78 258 Q 72 275 65 290 Q 60 302 55 308" />
  <path d="M 55 308 L 45 308" stroke-width="2" />
  <!-- Hind right leg (forward stride) -->
  <path d="M 95 235 Q 105 252 115 272 Q 122 288 128 300 Q 130 308 125 312" />
  <path d="M 125 312 L 115 312" stroke-width="2" />
  <!-- Tail (raised high, elegant S-curve) -->
  <path d="M 60 200 Q 42 180 30 155 Q 22 135 25 115 Q 28 100 38 92 Q 48 88 55 95" stroke-width="2.5" />
</svg>
