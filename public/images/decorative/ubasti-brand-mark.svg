<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- TODO: replace with final brand mark artwork -->
  <!-- Outer circle -->
  <circle cx="200" cy="200" r="185" stroke="#2B2E1F" stroke-width="2.5" />
  <!-- Inner circle -->
  <circle cx="200" cy="200" r="165" stroke="#2B2E1F" stroke-width="1" opacity="0.4" />
  <!-- Stylized U for Ubasti -->
  <path d="M140 130 L140 210 Q140 265 200 265 Q260 265 260 210 L260 130" stroke="#2B2E1F" stroke-width="8" stroke-linecap="round" />
